name: SBI Cards – Kong Enterprise CI/CD

on:
  pull_request:
    branches: [main]
    paths:
      - "openapi/**"
      - "insomnia/**"
      - "kong/mock-plugin.yaml"
      - ".github/workflows/kong-ee-cicd.yml"
  push:
    branches: [main]
    paths:
      - "openapi/**"
      - "insomnia/**"
      - "kong/mock-plugin.yaml"
      - ".github/workflows/kong-ee-cicd.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  KONG_ADMIN_URL: ${{ vars.KONG_ADMIN_URL || 'http://localhost:8001' }}
  KONG_WORKSPACE: ${{ vars.KONG_WORKSPACE || 'default' }}

jobs:
  # Step 1 – Lint OAS
  lint-openapi:
    name: "Step 1: Lint OAS with inso"
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install inso 12.4.0
        run: |
          curl -sSL "https://github.com/Kong/insomnia/releases/download/core@12.4.0/inso-linux-x64-12.4.0.tar.xz" \
            | tar -xJ -C /tmp/
          find /tmp -name 'inso' -type f -exec install -m 0755 {} /usr/local/bin/inso \;
          inso --version

      - name: Lint
        run: ./test-local.sh --lint-only

  # Steps 2-4 – Convert, deploy, publish to Dev Portal
  deploy-kong-ee:
    name: "Steps 2-4: Convert, Mock, Deploy, Publish"
    runs-on: self-hosted
    needs: lint-openapi
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Verify decK
        run: deck version

      - name: Deploy
        env:
          KONG_ADMIN_TOKEN: ${{ secrets.KONG_ADMIN_TOKEN }}
        run: ./test-local.sh --deploy-only

  # Step 5 – API tests
  test-with-inso:
    name: "Step 5: API tests with inso"
    runs-on: self-hosted
    needs: deploy-kong-ee
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Verify inso
        run: inso --version

      - name: Test
        env:
          KONG_PROXY_URL: ${{ secrets.KONG_PROXY_URL || vars.KONG_PROXY_URL }}
        run: ./test-local.sh --test-only
